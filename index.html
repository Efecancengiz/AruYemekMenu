<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günün Menüsü | Ardahan Üniversitesi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#eff6ff', // blue-50
                            DEFAULT: '#2563eb', // blue-600
                            bold: '#1d4ed8', // blue-700
                            dark: '#1e3a8a', // blue-900
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth scrolling for date nav */
        .date-scroll::-webkit-scrollbar {
            display: none;
        }
        .date-scroll {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .date-item {
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            min-width: 80px;
        }
        .date-item.active {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white;
            border-color: transparent;
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(29, 78, 216, 0.3), 0 4px 6px -2px rgba(29, 78, 216, 0.15);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-gray-50 to-blue-50/40 text-gray-800 font-sans antialiased flex flex-col min-h-screen relative overflow-x-hidden">
    <!-- Decorative Blob -->
    <div class="absolute top-0 right-0 -mr-32 -mt-32 w-96 h-96 rounded-full bg-brand/5 blur-3xl pointer-events-none"></div>
    
    <!-- Header -->
    <header class="bg-white shadow sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-2 sm:px-4 py-2.5 sm:py-4 grid grid-cols-[1fr_auto_1fr] items-center gap-1 sm:gap-4">
            
            <!-- Sol Boşluk (ortalamayı kusursuz yapmak için) -->
            <div></div>

            <!-- Orta Alan: Logo ve Üst/Alt Başlıklar -->
            <div class="flex flex-col items-center justify-center text-center">
                <div class="flex items-center justify-center gap-1.5 sm:gap-2">
                    <img src="./logo.jpg" alt="Logo" class="w-7 h-7 sm:w-8 sm:h-8 md:w-10 md:h-10 object-contain rounded-full border border-gray-200 p-0.5 bg-white shrink-0">
                    <h1 class="text-[12px] sm:text-base md:text-xl font-bold font-serif text-brand-dark leading-tight whitespace-nowrap">Ardahan Üniversitesi</h1>
                </div>
                <span class="text-[9px] sm:text-xs md:text-sm font-bold text-gray-500 uppercase tracking-widest mt-0.5 sm:mt-1">Yemek Menüsü</span>
            </div>

            <!-- Sağ Alan: Hamburger Menüsü -->
            <div class="flex justify-end relative group" tabindex="0">
                <button class="p-1.5 sm:p-2 text-gray-400 hover:text-gray-700 focus:outline-none rounded-lg hover:bg-gray-100 transition-colors cursor-pointer">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round">
                        <path d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                
                <div class="absolute right-0 top-full mt-1 w-44 sm:w-48 bg-white border border-gray-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible focus-within:opacity-100 focus-within:visible transition-all duration-200 transform scale-95 group-hover:scale-100 z-50 py-1">
                    <a href="admin.html" class="flex items-center gap-2 px-3 py-3 sm:px-4 sm:py-3 text-[13px] sm:text-sm font-semibold text-gray-700 hover:text-brand hover:bg-brand/5 transition-colors">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Yönetici Girişi
                    </a>
                </div>
            </div>

        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">
        
        <!-- Date Navigation -->
        <div class="mb-8 hidden md:block">
            <h2 class="text-lg font-semibold text-gray-700 mb-3 ml-1">Tarih Seçin</h2>
            <div class="relative group">
                <!-- Sol Ok Butonu -->
                <button id="scroll-left" class="absolute -left-4 top-1/2 -translate-y-1/2 z-10 bg-white/90 backdrop-blur-sm border border-gray-200 shadow-md rounded-full w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-white hover:text-brand hover:scale-110 transition-all focus:outline-none hidden md:flex">
                    <svg class="w-5 h-5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>

                <div id="date-nav" class="flex gap-3 overflow-x-auto date-scroll pb-4 px-1" style="scroll-snap-type: x mandatory;">
                    <!-- Script will populate these -->
                </div>

                <!-- Sağ Ok Butonu -->
                <button id="scroll-right" class="absolute -right-4 top-1/2 -translate-y-1/2 z-10 bg-white/90 backdrop-blur-sm border border-gray-200 shadow-md rounded-full w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-white hover:text-brand hover:scale-110 transition-all focus:outline-none hidden md:flex">
                    <svg class="w-5 h-5 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <!-- Selected Date Header -->
        <div class="mb-8 flex items-center gap-4">
            <div class="h-8 w-1.5 bg-gradient-to-b from-brand-bold to-brand rounded-full shadow-sm"></div>
            <h2 id="selected-date-display" class="text-2xl sm:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-gray-800 to-gray-500 tracking-tight drop-shadow-sm">Menü Yükleniyor...</h2>
        </div>

        <!-- Menu Container -->
        <div id="menu-container" class="grid gap-6 md:grid-cols-2">
            <!-- Loading State -->
            <div class="col-span-full flex justify-center py-12" id="loading-spinner">
                <svg class="animate-spin h-8 w-8 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            
            <!-- Cards will be populated here -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-100 py-6 border-t border-gray-200 mt-auto hidden md:block">
        <div class="max-w-4xl mx-auto px-4 flex flex-col items-center justify-center text-center text-sm text-gray-500">
            <p>&copy; <span id="current-year"></span> Ardahan Üniversitesi Yemek Otomasyonu. Tüm hakları saklıdır.</p>
            <p class="text-xs text-gray-400 mt-1 font-mono tracking-wider">v1.0.0</p>
        </div>
    </footer>

    <!-- Firebase and Main Script -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
