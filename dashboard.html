<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli | Ardahan Üniversitesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#eff6ff',
                            DEFAULT: '#2563eb',
                            bold: '#1d4ed8',
                            dark: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide sections to prevent flickering before auth check */
        body { opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    
    <!-- Navbar -->
    <nav class="bg-brand-bold shadow-lg">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <img src="./logo.jpg" alt="Logo" class="w-8 h-8 object-contain rounded-full bg-white p-0.5">
                    <span class="text-white font-bold text-xl tracking-wide">Ardahan Üni. Panel</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-email" class="text-brand-light text-sm hidden md:inline-block">Yükleniyor...</span>
                    <button id="logout-btn" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors border border-white/20 shadow-sm focus:outline-none">
                        Çıkış Yap
                    </button>
                    <a href="index.html" target="_blank" class="text-white/80 hover:text-white text-sm font-medium hover:underline">Siteyi Gör</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Dashboard Header -->
        <div class="mb-8 border-b border-gray-200 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Yönetim Paneli</h1>
                <p class="text-gray-500 mt-1">Sistemdeki ürünleri yönetin ve günlük menüleri oluşturun.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Product Management Card -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <div class="bg-gray-50 border-b border-gray-100 px-6 py-4">
                    <h2 class="text-lg font-bold text-brand-dark flex items-center gap-2">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Yeni Ürün Kaydı
                    </h2>
                </div>
                <div class="p-6">
                    <form id="product-form" class="space-y-5">
                        
                        <!-- Notification area for Product -->
                        <div id="product-alert" class="hidden rounded p-3 text-sm font-medium"></div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                            <select id="product-category" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-shadow bg-white text-gray-700">
                                <option value="" disabled selected>Kategori Seçin...</option>
                                <option value="corbalar">Çorbalar</option>
                                <option value="ana-yemek">Ana Yemek</option>
                                <option value="yan-yemek">Yan Yemek</option>
                                <option value="garnitur">Garnitür</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Ürün Adı</label>
                            <input type="text" id="product-name" required placeholder="Örn: Mercimek Çorbası" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-shadow">
                        </div>
                        <button type="submit" id="btn-save-product" class="w-full bg-brand hover:bg-brand-bold text-white font-bold py-3 px-4 rounded-lg shadow transition-colors flex justify-center items-center gap-2">
                            <span>Sisteme Kaydet</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Menu Builder Card -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <div class="bg-gray-50 border-b border-gray-100 px-6 py-4">
                    <h2 class="text-lg font-bold text-brand-dark flex items-center gap-2">
                        <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Günlük Menü Oluştur
                    </h2>
                </div>
                <div class="p-6">
                    <form id="menu-form" class="space-y-4">
                        
                        <!-- Notification area for Menu -->
                        <div id="menu-alert" class="hidden rounded p-3 text-sm font-medium"></div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Geçerli Tarih</label>
                            <input type="date" id="menu-date" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand outline-none">
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Çorbalar</label>
                                <select id="select-corbalar" required class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-brand outline-none text-sm bg-white">
                                    <option value="" disabled selected>Yükleniyor...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Ana Yemek</label>
                                <select id="select-ana-yemek" required class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-brand outline-none text-sm bg-white">
                                    <option value="" disabled selected>Yükleniyor...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Yan Yemek</label>
                                <select id="select-yan-yemek" required class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-brand outline-none text-sm bg-white">
                                    <option value="" disabled selected>Yükleniyor...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wide">Garnitür</label>
                                <select id="select-garnitur" required class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-brand outline-none text-sm bg-white">
                                    <option value="" disabled selected>Yükleniyor...</option>
                                </select>
                            </div>
                        </div>

                        <div class="pt-2">
                            <button type="submit" id="btn-save-menu" class="w-full bg-brand-bold hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg shadow transition-colors">
                                Menüyü Kaydet
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Firebase and Logic Scripts -->
    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
